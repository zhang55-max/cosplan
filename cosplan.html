/** 关闭筹备项表单弹窗 */
function closePrepForm() {
  document.getElementById('modal-prep-form').classList.remove('show');
  tempPrepImage = '';
}

/** 保存筹备项 */
function savePrepItem() {
  var idField = document.getElementById('prep-form-id');
  var charId = document.getElementById('prep-form-char-id').value;
  var titleVal = document.getElementById('prep-title').value.trim();

  if (!charId) { showToast('请先选择角色'); return; }
  if (!titleVal) { showToast('请输入标题'); return; }

  var category;
  if (idField.value) {
    category = document.getElementById('prep-form-category').value;
  } else {
    category = document.getElementById('prep-category').value;
  }

  var item = {
    id: idField.value || genId(),
    characterId: charId,
    category: category,
    title: titleVal,
    link: document.getElementById('prep-link').value.trim(),
    image: tempPrepImage,
    note: document.getElementById('prep-note').value.trim(),
    completed: false,
    createdAt: Date.now()
  };

  var items = loadData(STORAGE_KEYS.prepItems);

  if (idField.value) {
    // 编辑：保留 completed 和 createdAt
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === idField.value) {
        item.completed = items[i].completed;
        item.createdAt = items[i].createdAt;
        items[i] = item;
        break;
      }
    }
    showToast('筹备项已更新');
  } else {
    items.push(item);
    showToast('筹备项已添加');
  }

  saveData(STORAGE_KEYS.prepItems, items);
  closePrepForm();
  renderPrepList();
  renderDashboard();
}

/** 删除筹备项 */
function deletePrepItem(prepId) {
  var items = loadData(STORAGE_KEYS.prepItems);
  var item = null;
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === prepId) { item = items[i]; break; }
  }
  if (!item) return;

  items = items.filter(function (x) { return x.id !== prepId; });
  saveData(STORAGE_KEYS.prepItems, items);
  showToast('已删除：' + item.title);
  renderPrepList();
  renderDashboard();
}

// ==================== 照片素材管理 ====================

/** 素材页当前选中的角色 ID、类型、状态筛选 */
var photoSelectedCharId = '';
var photoFilter = 'all';
/** 当前素材类型：photo | video | music */
var mediaType = 'photo';
/** 当前查看详情的照片 ID */
var detailPhotoId = null;

/** 视频/音乐状态映射 */
var MEDIA_STATUS_MAP = {
  ref:    { label: '待参考', css: 'status-prep' },
  to_use: { label: '准备用', css: 'status-selecting' },
  used:   { label: '已采用', css: 'status-done' }
};

/** 渲染素材页（根据 mediaType 切换照片/视频/音乐） */
function renderPhotoPage() {
  var tabContainer = document.getElementById('photo-char-tabs');
  var photoFilterBar = document.getElementById('photo-filter-bar');
  var mediaFilterBar = document.getElementById('media-filter-bar');
  var gridContainer = document.getElementById('photo-grid-container');
  var mediaContainer = document.getElementById('media-list-container');
  var statsBar = document.getElementById('photo-stats-bar');
  var uploadBtn = document.getElementById('btn-upload-photo');
  var addMediaBtn = document.getElementById('btn-add-media');
  if (!tabContainer || !gridContainer || !mediaContainer || !statsBar) return;

  // 角色 Tab
  var characters = loadData(STORAGE_KEYS.characters);
  var tabsHtml = '';
  for (var i = 0; i < characters.length; i++) {
    var ch = characters[i];
    var sel = (ch.id === photoSelectedCharId) ? ' active' : '';
    tabsHtml += '<button class="filter-chip' + sel + '" data-char-id="' + ch.id + '">' +
      escapeHtml(ch.name) + '</button>';
  }
  tabContainer.innerHTML = tabsHtml;
  var tabBtns = tabContainer.querySelectorAll('.filter-chip');
  for (var t = 0; t < tabBtns.length; t++) {
    tabBtns[t].addEventListener('click', function () {
      photoSelectedCharId = this.getAttribute('data-char-id');
      photoFilter = 'all';
      renderPhotoPage();
    });
  }

  // 空状态
  if (!photoSelectedCharId) {
    gridContainer.style.display = 'none';
    mediaContainer.style.display = 'none';
    photoFilterBar.style.display = 'none';
    mediaFilterBar.style.display = 'none';
    statsBar.style.display = 'none';
    uploadBtn.style.display = 'none';
    addMediaBtn.style.display = 'none';
    gridContainer.innerHTML =
      '<div class="empty-state"><div class="empty-emoji">🖼️</div>' +
      '<div class="empty-text">请先选择上方角色</div></div>';
    return;
  }

  // 按类型切换显示
  if (mediaType === 'photo') {
    renderPhotoGrid(photoFilterBar, mediaFilterBar, gridContainer, mediaContainer, uploadBtn, addMediaBtn, statsBar);
  } else {
    renderMediaList(photoFilterBar, mediaFilterBar, gridContainer, mediaContainer, uploadBtn, addMediaBtn, statsBar);
  }
}

/** 渲染照片网格 */
function renderPhotoGrid(photoFilterBar, mediaFilterBar, gridContainer, mediaContainer, uploadBtn, addMediaBtn, statsBar) {
  gridContainer.style.display = '';
  mediaContainer.style.display = 'none';
  photoFilterBar.style.display = 'flex';
  mediaFilterBar.style.display = 'none';
  uploadBtn.style.display = 'block';
  addMediaBtn.style.display = 'none';

  var allPhotos = loadData(STORAGE_KEYS.photos).filter(function (p) {
    return p.characterId === photoSelectedCharId;
  });
  var photos = photoFilter === 'all' ? allPhotos :
    allPhotos.filter(function (p) { return p.status === photoFilter; });

  // 更新筛选按钮状态
  var filterBtns = photoFilterBar.querySelectorAll('.filter-chip');
  for (var fb = 0; fb < filterBtns.length; fb++) {
    var btn = filterBtns[fb];
    btn.classList.toggle('active', btn.getAttribute('data-filter') === photoFilter);
  }

  if (photos.length === 0) {
    gridContainer.innerHTML =
      '<div class="empty-state"><div class="empty-emoji">📷</div>' +
      '<div class="empty-text">' + (allPhotos.length === 0 ? '还没有上传照片' : '该状态下暂无照片') + '</div></div>';
  } else {
    photos.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    var html = '<div class="photo-grid">';
    for (var p = 0; p < photos.length; p++) {
      var photo = photos[p];
      html += '<div class="photo-card" data-photo-id="' + photo.id + '">' +
        '<img src="' + (photo.thumbnail || photo.data) + '" alt="">' +
        '<div class="photo-status-dot ' + photo.status + '"></div></div>';
    }
    html += '</div>';
    gridContainer.innerHTML = html;
    var cards = gridContainer.querySelectorAll('.photo-card');
    for (var c = 0; c < cards.length; c++) {
      cards[c].addEventListener('click', function () {
        openPhotoDetail(this.getAttribute('data-photo-id'));
      });
    }
  }

  var rawCount = allPhotos.filter(function (p) { return p.status === 'raw'; }).length;
  var toEditCount = allPhotos.filter(function (p) { return p.status === 'to_edit'; }).length;
  var editedCount = allPhotos.filter(function (p) { return p.status === 'edited'; }).length;
  statsBar.innerHTML =
    '<span>🔴 原片 ' + rawCount + '</span>' +
    '<span>🟡 待修 ' + toEditCount + '</span>' +
    '<span>🟢 已修 ' + editedCount + '</span>' +
    '<span>📊 共 ' + allPhotos.length + ' 张</span>';
}

/** 渲染视频/音乐列表 */
function renderMediaList(photoFilterBar, mediaFilterBar, gridContainer, mediaContainer, uploadBtn, addMediaBtn, statsBar) {
  gridContainer.style.display = 'none';
  mediaContainer.style.display = '';
  photoFilterBar.style.display = 'none';
  mediaFilterBar.style.display = 'flex';
  uploadBtn.style.display = 'none';
  addMediaBtn.style.display = 'block';

  var storageKey = mediaType === 'video' ? STORAGE_KEYS.videos : STORAGE_KEYS.music;
  var allItems = loadData(storageKey).filter(function (m) {
    return m.characterId === photoSelectedCharId;
  });
  var items = photoFilter === 'all' ? allItems :
    allItems.filter(function (m) { return m.status === photoFilter; });

  // 筛选按钮
  var filterBtns = mediaFilterBar.querySelectorAll('.filter-chip');
  for (var fb = 0; fb < filterBtns.length; fb++) {
    var btn = filterBtns[fb];
    btn.classList.toggle('active', btn.getAttribute('data-filter') === photoFilter);
  }

  // 按钮文字
  addMediaBtn.textContent = mediaType === 'video' ? '+ 添加视频素材' : '+ 添加音乐素材';

  // 空状态
  var typeLabel = mediaType === 'video' ? '视频' : '音乐';
  var typeEmoji = mediaType === 'video' ? '🎬' : '🎵';
  if (items.length === 0) {
    mediaContainer.innerHTML =
      '<div class="empty-state"><div class="empty-emoji">' + typeEmoji + '</div>' +
      '<div class="empty-text">' + (allItems.length === 0 ? '还没有' + typeLabel + '素材' : '该状态下暂无' + typeLabel) + '</div></div>';
  } else {
    items.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    var html = '<div class="media-list">';
    for (var m = 0; m < items.length; m++) {
      var item = items[m];
      var stInfo = MEDIA_STATUS_MAP[item.status] || MEDIA_STATUS_MAP.ref;
      // 图标区：有缩略图用 img，否则用 emoji
      var iconHtml;
      if (item.thumb) {
        iconHtml = '<div class="media-icon" style="overflow:hidden;padding:0;">' +
          '<img src="' + item.thumb + '" style="width:100%;height:100%;object-fit:cover;" alt="">' +
          (mediaType === 'video' ? '<span style="position:absolute;font-size:14px;">▶️</span>' : '') +
          '</div>';
      } else {
        iconHtml = '<div class="media-icon">' + typeEmoji + '</div>';
      }

      html += '<div class="media-card" data-media-id="' + item.id + '"' +
        (item.hasFile ? ' data-has-file="1"' : '') + '>' +
        iconHtml +
        '<div class="media-body">' +
          '<div class="media-title">' + escapeHtml(item.title) + '</div>' +
          (item.artist ? '<div class="media-sub">' + escapeHtml(item.artist) + '</div>' : '') +
          (item.note ? '<div class="media-sub">' + escapeHtml(item.note) + '</div>' : '') +
        '</div>' +
        (item.hasFile ? '<button class="btn btn-secondary" style="flex:none;padding:4px 10px;font-size:11px;min-height:auto;margin-right:6px;">▶ 播放</button>' : '') +
        '<span class="media-status ' + stInfo.css + '">' + stInfo.label + '</span>' +
      '</div>';
    }
    html += '</div>';
    mediaContainer.innerHTML = html;

    // 点击编辑/播放
    var cards = mediaContainer.querySelectorAll('.media-card');
    for (var c = 0; c < cards.length; c++) {
      cards[c].addEventListener('click', function (e) {
        // 如果点击的是播放按钮
        if (e.target.closest('.btn-secondary')) {
          e.stopPropagation();
          var mid = this.getAttribute('data-media-id');
          if (mediaType === 'video') {
            playVideo(mid);
          } else {
            playAudio(mid);
          }
          return;
        }
        openMediaForm(this.getAttribute('data-media-id'));
      });
    }
  }

  // 统计栏
  var refC = allItems.filter(function (m) { return m.status === 'ref'; }).length;
  var toC = allItems.filter(function (m) { return m.status === 'to_use'; }).length;
  var usedC = allItems.filter(function (m) { return m.status === 'used'; }).length;
  statsBar.innerHTML =
    '<span>📌 待参考 ' + refC + '</span>' +
    '<span>📋 准备用 ' + toC + '</span>' +
    '<span>✅ 已采用 ' + usedC + '</span>' +
    '<span>📊 共 ' + allItems.length + ' 项</span>';
}

/** 打开视频/音乐表单 */
function openMediaForm(mediaId) {
  var idField = document.getElementById('media-form-id');
  var charField = document.getElementById('media-form-char-id');
  var typeField = document.getElementById('media-form-type');
  var delGroup = document.getElementById('btn-group-media-del');
  var artistGroup = document.getElementById('media-artist-group');
  var videoFileGroup = document.getElementById('media-video-file-group');
  var audioFileGroup = document.getElementById('media-audio-file-group');
  var modal = document.getElementById('modal-media-form');

  typeField.value = mediaType;
  charField.value = photoSelectedCharId;
  tempMediaFile = null;
  tempMediaThumb = '';

  var isVideo = mediaType === 'video';
  var isMusic = mediaType === 'music';
  artistGroup.style.display = isMusic ? 'block' : 'none';
  videoFileGroup.style.display = isVideo ? 'block' : 'none';
  audioFileGroup.style.display = isMusic ? 'block' : 'none';

  if (mediaId) {
    var storageKey = isVideo ? STORAGE_KEYS.videos : STORAGE_KEYS.music;
    var items = loadData(storageKey);
    var item = null;
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === mediaId) { item = items[i]; break; }
    }
    if (!item) { showToast('素材不存在'); return; }

    document.getElementById('modal-media-title').textContent = '编辑' + (isVideo ? '视频' : '音乐') + '素材';
    idField.value = item.id;
    document.getElementById('media-title').value = item.title || '';
    document.getElementById('media-link').value = item.link || '';
    document.getElementById('media-note').value = item.note || '';
    document.getElementById('media-status').value = item.status || 'ref';
    document.getElementById('media-artist').value = item.artist || '';
    delGroup.style.display = 'flex';

    // 已有缩略图则显示
    if (item.thumb) {
      tempMediaThumb = item.thumb;
      if (isVideo) renderVideoImportPreview();
    } else {
      if (isVideo) renderVideoImportPreview();
      if (isMusic) renderAudioImportPreview();
    }
    // 标记已有文件
    if (item.hasFile) {
      if (isVideo) {
        tempMediaThumb = item.thumb || '';
        renderVideoImportPreview();
      }
    }
  } else {
    document.getElementById('modal-media-title').textContent = '添加' + (isVideo ? '视频' : '音乐') + '素材';
    idField.value = '';
    document.getElementById('media-title').value = '';
    document.getElementById('media-link').value = '';
    document.getElementById('media-note').value = '';
    document.getElementById('media-status').value = 'ref';

/** 保存视频/音乐素材 */
function saveMediaItem() {
  var idField = document.getElementById('media-form-id');
  var title = document.getElementById('media-title').value.trim();
  if (!title) { showToast('请输入标题'); return; }

  var storageKey = document.getElementById('media-form-type').value === 'video' ? STORAGE_KEYS.videos : STORAGE_KEYS.music;
  var item = {
    id: idField.value || genId(),
    characterId: document.getElementById('media-form-char-id').value,
    title: title,
    artist: document.getElementById('media-artist').value.trim(),
    link: document.getElementById('media-link').value.trim(),
    note: document.getElementById('media-note').value.trim(),
    status: document.getElementById('media-status').value,
    createdAt: Date.now()
  };

  var items = loadData(storageKey);
  if (idField.value) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === idField.value) {
        item.createdAt = items[i].createdAt;
        items[i] = item;
        break;
      }
    }
  } else {
    items.push(item);
  }

  // 存储缩略图标记
  if (tempMediaFile) {
    item.hasFile = true;
    item.thumb = tempMediaThumb;
  } else if (idField.value) {
    // 编辑时保留原有文件标记
    for (var j = 0; j < items.length; j++) {
      if (items[j].id === item.id) {
        item.hasFile = items[j].hasFile;
        item.thumb = items[j].thumb;
        break;
      }
    }
  }

  saveData(storageKey, items);

  // 保存文件到 IndexedDB
  var savePromise = tempMediaFile ? saveMediaFile(item.id) : Promise.resolve();
  savePromise.then(function () {
    showToast(idField.value ? '素材已更新' : '素材已添加');
    closeMediaForm();
    renderPhotoPage();
  }).catch(function () {
    showToast('文件保存失败，请重试');
  });
}

/** 删除视频/音乐素材 */
function deleteMediaItem() {
  var id = document.getElementById('media-form-id').value;
  if (!id) return;
  var storageKey = document.getElementById('media-form-type').value === 'video' ? STORAGE_KEYS.videos : STORAGE_KEYS.music;
  var items = loadData(storageKey).filter(function (m) { return m.id !== id; });
  saveData(storageKey, items);

  deleteMediaFile(id).then(function () {

}

/** 上传照片处理 */
function handlePhotoUpload(files) {
  if (!photoSelectedCharId) { showToast('请先选择角色'); return; }
  if (!files || files.length === 0) return;

  var processed = 0;
  for (var f = 0; f < files.length; f++) {
    (function (file) {
      compressImage(file, 800, 0.55).then(function (fullBase64) {
        // 生成缩略图
        return compressImage(file, 200, 0.4).then(function (thumbBase64) {
          var photo = {
            id: genId(),
            characterId: photoSelectedCharId,
            data: fullBase64,
            thumbnail: thumbBase64,
            status: 'raw',
            note: '',
            createdAt: Date.now()
          };
          var photos = loadData(STORAGE_KEYS.photos);
          photos.push(photo);
          saveData(STORAGE_KEYS.photos, photos);

          processed++;
          if (processed === files.length) {
            showToast('已上传 ' + processed + ' 张照片');
            renderPhotoPage();
            renderDashboard();
          }
        });
      }).catch(function () {
        processed++;
        if (processed === files.length) {
          renderPhotoPage();
          renderDashboard();
        }
      });
    })(files[f]);
  }
}

// ==================== IndexedDB（视频/音频文件存储） ====================

var IDB_NAME = 'cosplan_media';
var IDB_VERSION = 1;

function openIDB() {
  return new Promise(function (resolve, reject) {
    var req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = function (e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('files')) {
        db.createObjectStore('files', { keyPath: 'id' });
      }
    };
    req.onsuccess = function (e) { resolve(e.target.result); };
    req.onerror = function () { reject(new Error('IndexedDB open failed')); };
  });
}

/** 存储文件到 IndexedDB */
function idbPut(id, blob) {
  return openIDB().then(function (db) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put({ id: id, blob: blob });
      tx.oncomplete = function () { db.close(); resolve(); };
      tx.onerror = function () { db.close(); reject(); };
    });
  });
}

/** 从 IndexedDB 读取文件 */
function idbGet(id) {
  return openIDB().then(function (db) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction('files', 'readonly');
      var req = tx.objectStore('files').get(id);
      req.onsuccess = function () { db.close(); resolve(req.result ? req.result.blob : null); };
      req.onerror = function () { db.close(); reject(); };
    });
  });
}

/** 从 IndexedDB 删除文件 */
function idbDelete(id) {
  return openIDB().then(function (db) {
    return new Promise(function (resolve, reject) {
      var tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').delete(id);
      tx.oncomplete = function () { db.close(); resolve(); };
      tx.onerror = function () { db.close(); reject(); };
    });
  });
}

/** 从视频文件提取第一帧缩略图 */
function extractVideoThumb(file) {
  return new Promise(function (resolve, reject) {
    var video = document.createElement('video');
    video.preload = 'metadata';
    video.muted = true;
    video.playsInline = true;
    var url = URL.createObjectURL(file);
    video.src = url;
    video.onloadeddata = function () {
      video.currentTime = 1;
    };
    video.onseeked = function () {
      var canvas = document.createElement('canvas');
      canvas.width = 400;
      canvas.height = Math.round(canvas.width * (video.videoHeight / video.videoWidth)) || 300;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.5));
    };
    video.onerror = function () {
      URL.revokeObjectURL(url);
      resolve('');
    };
    // 超时处理
    setTimeout(function () {
      if (url) { URL.revokeObjectURL(url); resolve(''); }
    }, 5000);
  });
}

// ==================== 文案生成器 ====================

/** 文案页当前角色 */
var copySelectedCharId = '';
/** 当前选中的台词 ID */
var selectedLineId = '';
/** 当前选中的标签 ID 数组（按点击顺序） */
var selectedTagIds = [];
/** 标签当前平台筛选 */
var copyPlatformFilter = 'all';

/** 渲染文案页 */
function renderCopyPage() {
  var charSelect = document.getElementById('copy-char-select');
  if (!charSelect) return;

  var characters = loadData(STORAGE_KEYS.characters);
  var opts = '<option value="">-- 请选择角色 --</option>';
  for (var i = 0; i < characters.length; i++) {
    var sel = (characters[i].id === copySelectedCharId) ? ' selected' : '';
    opts += '<option value="' + characters[i].id + '"' + sel + '>' + escapeHtml(characters[i].name) + '</option>';
  }
  charSelect.innerHTML = opts;

  if (!copySelectedCharId) {
    document.getElementById('copy-line-list').innerHTML =
      '<div style="color:var(--text-muted);font-size:var(--font-sm);text-align:center;padding:12px;">请先选择角色</div>';
    document.getElementById('copy-tag-cloud').innerHTML = '';
    document.getElementById('copy-preview').textContent = '';
    return;
  }

  renderLineList();
  renderTagCloud();
  renderCopyPreview();
}

/** 渲染台词列表 */
function renderLineList() {
  var container = document.getElementById('copy-line-list');
  if (!container) return;
  var lines = loadData(STORAGE_KEYS.copies).filter(function (c) {
    return c.characterId === copySelectedCharId && c.type === 'line';
  });

  if (lines.length === 0) {
    container.innerHTML =
      '<div style="color:var(--text-muted);font-size:var(--font-sm);text-align:center;padding:12px;">暂无台词，点击下方添加</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var isSel = (line.id === selectedLineId) ? ' selected' : '';
    html += '<div class="line-item' + isSel + '" data-line-id="' + line.id + '">' +
      '<span class="line-text">' + escapeHtml(line.content) + '</span>' +
      '<button class="line-del" title="删除">✕</button>' +
    '</div>';
  }
  container.innerHTML = html;

  // 点击选中
  var items = container.querySelectorAll('.line-item');
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener('click', function (e) {
      if (e.target.classList.contains('line-del')) return;
      var lid = this.getAttribute('data-line-id');
      selectedLineId = (selectedLineId === lid) ? '' : lid;
      renderLineList();
      renderCopyPreview();
    });
  }
  // 删除按钮
  var delBtns = container.querySelectorAll('.line-del');
  for (var d = 0; d < delBtns.length; d++) {
    delBtns[d].addEventListener('click', function (e) {
      e.stopPropagation();
      var lid = this.parentElement.getAttribute('data-line-id');
      deleteCopyItem(lid);
    });
  }
}

/** 渲染标签云 */
function renderTagCloud() {
  var container = document.getElementById('copy-tag-cloud');
  if (!container) return;

  var allTags = loadData(STORAGE_KEYS.copies).filter(function (c) {
    return c.characterId === copySelectedCharId && c.type === 'tag';
  });

  // 平台筛选
  var tags = allTags;
  if (copyPlatformFilter !== 'all') {
    tags = allTags.filter(function (t) {
      return t.platform === copyPlatformFilter || t.platform === 'all';
    });
  }

  if (tags.length === 0) {
    container.innerHTML =
      '<div style="width:100%;color:var(--text-muted);font-size:var(--font-sm);text-align:center;padding:12px;">暂无标签，点击下方添加</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < tags.length; i++) {
    var tag = tags[i];
    var checked = selectedTagIds.indexOf(tag.id) >= 0 ? ' checked' : '';
    html += '<span class="tag-chip' + checked + '" data-tag-id="' + tag.id + '">' +
      escapeHtml(tag.content) + '</span>';
  }
  container.innerHTML = html;

  // 点击切换选中
  var chips = container.querySelectorAll('.tag-chip');
  for (var c = 0; c < chips.length; c++) {
    chips[c].addEventListener('click', function () {
      var tid = this.getAttribute('data-tag-id');
      var idx = selectedTagIds.indexOf(tid);
      if (idx >= 0) {
        selectedTagIds.splice(idx, 1);
      } else {
        selectedTagIds.push(tid);
      }
      renderTagCloud();
      renderCopyPreview();
    });
  }
}

/** 渲染文案预览 */
function renderCopyPreview() {
  var preview = document.getElementById('copy-preview');
  if (!preview) return;

  var lines = loadData(STORAGE_KEYS.copies).filter(function (c) {
    return c.characterId === copySelectedCharId && c.type === 'line' && c.id === selectedLineId;
  });
  var selectedLine = lines.length > 0 ? lines[0].content : '';

  var allTags = loadData(STORAGE_KEYS.copies).filter(function (c) {
    return c.characterId === copySelectedCharId && c.type === 'tag';
  });
  // 按点击顺序拼接标签
  var tagText = '';
  for (var ti = 0; ti < selectedTagIds.length; ti++) {
    var tid = selectedTagIds[ti];
    for (var ta = 0; ta < allTags.length; ta++) {
      if (allTags[ta].id === tid) {
        tagText += (tagText ? ' ' : '') + allTags[ta].content;
        break;
      }
    }
  }

  var characters = loadData(STORAGE_KEYS.characters);
  var ch = null;
  for (var j = 0; j < characters.length; j++) {
    if (characters[j].id === copySelectedCharId) { ch = characters[j]; break; }
  }

  var parts = [];
  if (selectedLine) parts.push('"' + selectedLine + '"');
  if (tagText) parts.push(tagText);

  preview.textContent = parts.length > 0 ? parts.join('\n') : '';
}

/** 生成文案（重新随机排列标签） */
function generateCopy() {
  if (!copySelectedCharId) { showToast('请先选择角色'); return; }
  // 随机打乱已选标签顺序
  for (var i = selectedTagIds.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = selectedTagIds[i];
    selectedTagIds[i] = selectedTagIds[j];
    selectedTagIds[j] = tmp;
  }
  renderTagCloud();
  renderCopyPreview();
  showToast('文案已生成');
}

/** 复制文案到剪贴板 */
function copyToClipboard() {
  var preview = document.getElementById('copy-preview');
  var text = preview ? preview.textContent.trim() : '';
  if (!text) { showToast('请先生成文案'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () {
      showToast('已复制到剪贴板');
    }).catch(function () {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

/** 降级复制方案 */
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('已复制到剪贴板'); }
  catch (e) { showToast('复制失败，请手动复制'); }
  document.body.removeChild(ta);
}

function deleteCopyItem(id) {

// ==================== 数据导出导入 ====================

/** 导出所有数据为 JSON 文件 */
function exportAllData() {
  var data = {};
  for (var key in STORAGE_KEYS) {
    if (STORAGE_KEYS.hasOwnProperty(key)) {
      data[STORAGE_KEYS[key]] = loadData(STORAGE_KEYS[key]);
    }
  }
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'cosplan-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('数据已导出');
}

/** 导入 JSON 文件 */
function importData(file) {
  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var data = JSON.parse(e.target.result);
      var count = 0;
      for (var key in data) {
        if (data.hasOwnProperty(key) && Array.isArray(data[key])) {
          saveData(key, data[key]);
          count += data[key].length;
        }
      }
      showToast('已导入 ' + count + ' 条数据');
      renderDashboard();
      renderCharacterList();
    } catch (err) {
      showToast('文件格式不正确');
    }
  };
  reader.readAsText(file);
}

/** 重置所有数据 */
function resetAllData() {
  for (var key in STORAGE_KEYS) {
    if (STORAGE_KEYS.hasOwnProperty(key)) {
      saveData(STORAGE_KEYS[key], []);
    }
  }
  // 清空 IndexedDB
  openIDB().then(function (db) {
    var tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').clear();
    db.close();
  }).catch(function () {});
  copySelectedCharId = '';
  selectedLineId = '';
  selectedTagIds = [];
  photoSelectedCharId = '';
  prepSelectedCharId = '';
  detailCharId = null;
  mediaType = 'photo';
  renderDashboard();
  renderCharacterList();
  renderPrepList();
  renderPhotoPage();
  renderCopyPage();
  showToast('所有数据已重置');
}

// ==================== 筹备文档导出 ====================

/** 生成角色筹备 Markdown 文档 */
function generatePrepDoc() {
  if (!prepSelectedCharId) { showToast('请先选择角色'); return ''; }

  var characters = loadData(STORAGE_KEYS.characters);
  var ch = null;
  for (var i = 0; i < characters.length; i++) {
    if (characters[i].id === prepSelectedCharId) { ch = characters[i]; break; }
  }
  if (!ch) return '';

  var items = loadData(STORAGE_KEYS.prepItems).filter(function (item) {
    return item.characterId === prepSelectedCharId;
  });

  var lines = [];
  lines.push('# ' + ch.name + ' - 拍摄筹备文档');
  lines.push('');
  lines.push('> 导出时间：' + new Date().toLocaleDateString('zh-CN'));
  if (ch.source) lines.push('> 作品来源：' + ch.source);
  lines.push('> 项目状态：' + ((STATUS_MAP[ch.status] || STATUS_MAP.prep).label));
  lines.push('');

  for (var c = 0; c < PREP_CATEGORIES.length; c++) {
    var cat = PREP_CATEGORIES[c];
    var catItems = items.filter(function (item) { return item.category === cat.key; });
    var done = catItems.filter(function (item) { return item.completed; }).length;

    lines.push('## ' + cat.emoji + ' ' + cat.label + '（' + done + '/' + catItems.length + '）');
    lines.push('');

    if (catItems.length === 0) {
      lines.push('（暂无项目）');
      lines.push('');
    } else {
      for (var p = 0; p < catItems.length; p++) {
        var item = catItems[p];
        var checkbox = item.completed ? '[x]' : '[ ]';
        lines.push('- ' + checkbox + ' **' + item.title + '**');
        if (item.link) lines.push('  - 链接：' + item.link);
        if (item.note) lines.push('  - 备注：' + item.note);
        lines.push('');
      }
    }
  }

  // 汇总
  var totalItems = items.length;
  var totalDone = items.filter(function (item) { return item.completed; }).length;
  var pct = totalItems > 0 ? Math.round(totalDone / totalItems * 100) : 0;
  lines.push('---');
  lines.push('');
  lines.push('**筹备总进度：' + totalDone + '/' + totalItems + '（' + pct + '%）**');

  return lines.join('\n');
}

/** 打开导出预览弹窗 */
function openExportModal() {
  var doc = generatePrepDoc();
  if (!doc) return;
  document.getElementById('export-preview').textContent = doc;
  document.getElementById('modal-export-prep').classList.add('show');
}

/** 下载为 .md 文件 */
function downloadExportDoc() {
  var doc = generatePrepDoc();
  if (!doc) return;
  var blob = new Blob([doc], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '筹备文档-' + new Date().toISOString().slice(0, 10) + '.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('文档已下载');
}

  if (refAddBtn && refInput) {
    refAddBtn.addEventListener('click', function () { refInput.click(); });
    refInput.addEventListener('change', function () {
      var files = refInput.files;
      if (!files || files.length === 0) return;

      // 限制参考图总数不超过20张
      if (tempRefImages.length + files.length > 20) {
        showToast('参考图最多20张，当前已有' + tempRefImages.length + '张');
        refInput.value = '';
        return;
      }

      var processed = 0;
      for (var f = 0; f < files.length; f++) {
        (function (file) {
          compressImage(file, 800, 0.55).then(function (base64) {
            tempRefImages.push({ id: genId(), data: base64, note: '' });
            processed++;
            if (processed === files.length || tempRefImages.length >= 20) {
              renderRefImagesPreview();
              showToast('已添加 ' + processed + ' 张参考图');
            }
          }).catch(function () {

        })(files[f]);

    });
  }

  // 二次确认弹窗
  var confirmModal = document.getElementById('modal-confirm');
  var confirmCallback = null;

  window.openConfirmDialog = function (text, highlight, callback) {
    document.getElementById('confirm-text').textContent = text;
    document.getElementById('confirm-highlight').textContent = highlight;
    confirmCallback = callback;
    confirmModal.classList.add('show');
  };

  document.getElementById('btn-confirm-cancel').addEventListener('click', function () {
    confirmModal.classList.remove('show');
    confirmCallback = null;
  });
  document.getElementById('btn-confirm-ok').addEventListener('click', function () {
    confirmModal.classList.remove('show');
    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
  });
  // 点击遮罩关闭
  confirmModal.addEventListener('click', function (e) {
    if (e.target === confirmModal) { confirmModal.classList.remove('show'); confirmCallback = null; }
  });
})();

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>CosPlan - COSER 创作助手</title>
  <!--
    CosPlan V1.0 - COSER 创作助手
    技术栈: HTML + CSS + JS (零依赖)
    存储: localStorage
    打包: HBuilder X → 云打包 APK
  -->

  <style>
    /* ========== CSS 变量 ========== */
    :root {
      --bg: #1a1a2e;
      --card: #252547;
      --card-hover: #2f2f5a;
      --border: #333355;
      --text: #ffffff;
      --text-secondary: #b0b0cc;
      --text-muted: #6a6a8a;
      --primary: #9B59B6;
      --secondary: #E91E8C;
      --gradient: linear-gradient(135deg, #9B59B6, #E91E8C);
      --success: #4CAF50;
      --warning: #FF9800;
      --danger: #F44336;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --space-xs: 6px;
      --space-sm: 12px;
      --space-md: 18px;
      --space-lg: 24px;
      --space-xl: 36px;
      --nav-height: 60px;
      --font-sm: 12px;
      --font-base: 14px;
      --font-lg: 16px;
      --font-xl: 18px;
      --font-xxl: 22px;
      --transition: 0.25s ease;
    }

    /* ========== 全局重置 ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--font-base);
      line-height: 1.5;
      overflow-x: hidden;
      /* 为底部导航留出空间 */
      padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
      min-height: 100vh;
    }

    /* ========== 页面容器 ========== */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* 所有视图默认隐藏 */
    .view {
      display: none;
      padding: var(--space-lg);
      padding-top: var(--space-md);
      animation: fadeSlideIn 0.25s ease;
    }
    .view.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ========== 页面标题栏 ========== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }
    .page-header h1 {
      font-size: var(--font-xxl);
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ========== 统计卡片区 ========== */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      text-align: center;
      cursor: pointer;
      transition: transform var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card:active { transform: scale(0.95); }
    .stat-card .stat-emoji {
      font-size: 28px;
      margin-bottom: var(--space-xs);
    }
    .stat-card .stat-number {
      font-size: 28px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: var(--font-sm);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ========== 快捷操作区 ========== */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .quick-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-xl);
      font-size: var(--font-base);
      font-weight: 600;
      border: none;
      cursor: pointer;
      min-height: 44px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .quick-btn:active { opacity: 0.8; transform: scale(0.97); }
    .quick-btn.primary {
      background: var(--gradient);
      color: #fff;
    }
    .quick-btn.secondary {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }

    /* ========== 项目列表区 ========== */
    .section-title {
      font-size: var(--font-lg);
      font-weight: 600;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .section-title .count {
      font-size: var(--font-sm);
      color: var(--text-muted);
      font-weight: 400;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .project-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-sm);
      display: flex;
      gap: var(--space-sm);
      cursor: pointer;
      transition: transform var(--transition), background var(--transition);
      position: relative;
      overflow: hidden;
    }
    .project-card:active { transform: scale(0.98); background: var(--card-hover); }

    .project-avatar {
      width: 56px;
      height: 56px;
      border-radius: var(--radius);
      background: var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 28px;
    }
    .project-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .project-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .project-name {
      font-size: var(--font-lg);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-source {
      font-size: var(--font-sm);
      color: var(--text-secondary);
    }

    .project-progress-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .project-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .project-progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .project-progress-text {
      font-size: var(--font-sm);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .project-status-tag {
      position: absolute;
      top: var(--space-xs);
      right: var(--space-xs);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .status-prep    { background: rgba(156, 39, 176, 0.25); color: #ce93d8; }
    .status-shooting { background: rgba(33, 150, 243, 0.25); color: #90caf9; }
    .status-selecting{ background: rgba(255, 152, 0, 0.25); color: #ffb74d; }
    .status-editing  { background: rgba(233, 30, 140, 0.25); color: #f48fb1; }
    .status-done     { background: rgba(76, 175, 80, 0.25); color: #81c784; }

    /* ========== 空状态 ========== */
    .empty-state {
      text-align: center;
      padding: var(--space-xl) var(--space-lg);
      color: var(--text-muted);
    }
    .empty-state .empty-emoji {
      font-size: 48px;
      margin-bottom: var(--space-sm);
    }
    .empty-state .empty-text {
      font-size: var(--font-base);
      margin-bottom: var(--space-md);
    }

    /* ========== 占位视图 ========== */
    .placeholder-view {
      text-align: center;
      padding: var(--space-xl) 0;
      color: var(--text-muted);
    }
    .placeholder-view .ph-emoji { font-size: 48px; }
    .placeholder-view .ph-text { margin-top: var(--space-sm); font-size: var(--font-base); }
    .placeholder-view .ph-hint { font-size: var(--font-sm); color: var(--text-muted); margin-top: var(--space-xs); }

    /* ========== 底部导航栏 ========== */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      transition: color var(--transition);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item .nav-emoji { font-size: 22px; transition: transform var(--transition); }
    .nav-item .nav-label { font-size: 10px; font-weight: 500; }
    .nav-item.selected {
      color: var(--primary);
    }
    .nav-item.selected::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--gradient);
      border-radius: 0 0 3px 3px;
    }
    .nav-item.selected .nav-emoji { transform: scale(1.1); }

    /* ========== Toast ========== */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gradient);
      color: #fff;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-xl);
      font-size: var(--font-base);
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========== 模态弹窗容器 ========== */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    /* Phase 2+ 会完善弹窗内容 */

    /* ========== 小头像圆形裁剪 ========== */
    .avatar-circle {
      border-radius: 50%;
      overflow: hidden;
    }

    /* ========== 角色网格（2列） ========== */
    .character-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
    }
    .character-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition);
      position: relative;
    }
    .character-card:active { transform: scale(0.96); }
    .character-card .card-img-wrap {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 56px;
    }
    .character-card .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .character-card .card-body {
      padding: var(--space-sm);
    }
    .character-card .card-name {
      font-size: var(--font-base);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .character-card .card-source {
      font-size: var(--font-sm);
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .character-card .card-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: var(--space-xs);
      display: flex;
      gap: var(--space-sm);
    }
    /* 长按删除提示 */
    .character-card .delete-hint {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: var(--danger);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .character-card.long-press-mode .delete-hint { opacity: 1; }

    /* ========== 浮动操作按钮 ========== */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 20px);
      right: calc(50% - 220px);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gradient);
      color: #fff;
      font-size: 26px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(155,89,182,0.4);
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .fab:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(155,89,182,0.3); }
    /* 在宽屏（PC）上FAB贴在app容器右侧 */
    @media (min-width: 481px) {
      .fab { right: calc(50% - 240px); }
    }
    @media (max-width: 480px) {
      .fab { right: 16px; }
    }

    /* ========== 弹窗通用 ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .modal.show { display: flex; }

    .modal-sheet {
      background: var(--card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      padding: var(--space-lg);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }
    .modal-header h2 {
      font-size: var(--font-xl);
      font-weight: 600;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border);
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== 表单 ========== */
    .form-group {
      margin-bottom: var(--space-md);
    }
    .form-group label {
      display: block;
      font-size: var(--font-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
      font-weight: 500;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: var(--space-sm);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: var(--font-base);
      font-family: inherit;
      transition: border-color var(--transition);
      min-height: 44px;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(155,89,182,0.15);
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--text-muted);
    }

    /* ========== 图片上传区 ========== */
    .upload-area {
      width: 100%;
      aspect-ratio: 3/4;
      max-height: 200px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color var(--transition);
      overflow: hidden;
      position: relative;
    }
    .upload-area:hover, .upload-area:active { border-color: var(--primary); }
    .upload-area img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .upload-area .upload-placeholder {
      text-align: center;
      color: var(--text-muted);
    }
    .upload-area .upload-placeholder .upload-emoji { font-size: 36px; }
    .upload-area .upload-placeholder .upload-text { font-size: var(--font-sm); margin-top: 4px; }
    .upload-area.has-image { border-style: solid; border-color: var(--primary); }

    /* 参考图缩略图列表 */
    .ref-images-list {
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
      margin-top: var(--space-xs);
    }
    .ref-thumb {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--border);
      position: relative;
      flex-shrink: 0;
    }
    .ref-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .ref-thumb .ref-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 11px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .ref-add-btn {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1.5px dashed var(--border);
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ========== 按钮组 ========== */
    .btn-group {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-lg);
    }
    .btn {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-xl);
      font-size: var(--font-base);
      font-weight: 600;
      border: none;
      cursor: pointer;
      min-height: 44px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .btn:active { opacity: 0.8; transform: scale(0.97); }
    .btn-primary {
      background: var(--gradient);
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    /* ========== 角色详情子视图 ========== */
    .detail-view {
      display: none;
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: var(--bg);
      z-index: 50;
      overflow-y: auto;
      padding: var(--space-lg);
      padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 40px);
      animation: fadeSlideIn 0.3s ease;
    }
    .detail-view.active { display: block; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      color: var(--primary);
      font-size: var(--font-base);
      cursor: pointer;
      margin-bottom: var(--space-md);
      background: none;
      border: none;
    }
    .detail-avatar-lg {
      width: 100%;
      max-height: 280px;
      border-radius: var(--radius-lg);
      object-fit: cover;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      overflow: hidden;
      margin-bottom: var(--space-md);
    }
    .detail-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
    .detail-name {
      font-size: var(--font-xxl);
      font-weight: 700;
      margin-bottom: var(--space-xs);
    }
    .detail-source {
      display: inline-block;
      background: rgba(155,89,182,0.2);
      color: #ce93d8;
      padding: 2px 10px;
      border-radius: var(--radius-sm);
      font-size: var(--font-sm);
      margin-bottom: var(--space-sm);
    }
    .detail-bio {
      color: var(--text-secondary);
      font-size: var(--font-base);
      line-height: 1.7;
      margin-bottom: var(--space-md);
      white-space: pre-wrap;
    }
    .detail-section {
      margin-bottom: var(--space-md);
    }
    .detail-section h3 {
      font-size: var(--font-base);
      font-weight: 600;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    /* 参考图横滚 */
    .ref-scroll {
      display: flex;
      gap: var(--space-sm);
      overflow-x: auto;
      padding-bottom: var(--space-xs);
      -webkit-overflow-scrolling: touch;
    }
    .ref-scroll::-webkit-scrollbar { display: none; }
    .ref-scroll-item {
      flex-shrink: 0;
      width: 100px;
      height: 140px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
    }
    .ref-scroll-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* 关联数据统计行 */
    .detail-stats-row {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }
    .detail-stat {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      padding: var(--space-sm);
      text-align: center;
      cursor: pointer;
      transition: transform var(--transition);
    }
    .detail-stat:active { transform: scale(0.96); }
    .detail-stat .ds-num { font-size: var(--font-xl); font-weight: 700; }
    .detail-stat .ds-label { font-size: 11px; color: var(--text-muted); }

    /* ========== 筹备清单手风琴 ========== */
    .prep-char-selector {
      margin-bottom: var(--space-md);
    }
    .prep-char-selector .form-select {
      font-size: var(--font-base);
      font-weight: 500;
    }

    .accordion { margin-bottom: var(--space-sm); }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      min-height: 44px;
    }
    .accordion-header:active { background: var(--card-hover); }
    .accordion-header .acc-title {
      font-weight: 600;
      font-size: var(--font-base);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .accordion-header .acc-count {
      font-size: var(--font-sm);
      color: var(--text-muted);
    }
    .accordion-header .acc-arrow {
      font-size: var(--font-sm);
      color: var(--text-muted);
      transition: transform 0.3s ease;
      display: inline-block;
    }
    .accordion.open .acc-arrow { transform: rotate(180deg); }

    .accordion-body {
      display: none;
      background: var(--card);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 0 var(--space-md) var(--space-sm);
    }
    .accordion.open .accordion-body { display: block; }

    .prep-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .prep-item:last-child { border-bottom: none; }
    .prep-checkbox {
      flex-shrink: 0;
      margin-top: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all var(--transition);
      font-size: 12px;
      color: transparent;
    }
    .prep-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .prep-item-body { flex: 1; min-width: 0; }
    .prep-item-title {
      font-size: var(--font-base);
      font-weight: 500;
    }
    .prep-item-title.done { text-decoration: line-through; color: var(--text-muted); }
    .prep-item-note {
      font-size: var(--font-sm);
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prep-item-link {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      color: var(--primary);
      margin-top: 2px;
      text-decoration: none;
    }
    .prep-item-delete {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--danger);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity var(--transition);
    }
    .prep-item-delete:active { opacity: 1; }

    /* 筹备项参考图上传 */
    .prep-img-upload {
      width: 100%;
      height: 120px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .prep-img-upload:active { border-color: var(--primary); }
    .prep-img-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .prep-img-upload.has-img { border-style: solid; border-color: var(--primary); }
    .prep-img-placeholder {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    /* 筹备项列表中的缩略图 */
    .prep-item-thumb {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: var(--border);
      flex-shrink: 0;
      overflow: hidden;
      margin-top: 4px;
    }
    .prep-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ========== 照片素材页 ========== */
    .photo-filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: var(--space-md);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .photo-filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: var(--radius-xl);
      font-size: var(--font-sm);
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .filter-chip:active { transform: scale(0.95); }
    .filter-chip.active {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .photo-card {
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      position: relative;
      transition: transform var(--transition);
    }
    .photo-card:active { transform: scale(0.95); }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-status-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.5);
    }
    .photo-status-dot.raw     { background: var(--danger); }
    .photo-status-dot.to_edit { background: var(--warning); }
    .photo-status-dot.edited  { background: var(--success); }

    .photo-stats-bar {
      display: flex;
      justify-content: center;
      gap: var(--space-md);
      margin-top: var(--space-md);
      padding: var(--space-sm);
      background: var(--card);
      border-radius: var(--radius);
      font-size: var(--font-sm);
    }
    .photo-stats-bar span { color: var(--text-secondary); }

    .photo-upload-btn {
      display: block;
      width: 100%;
      padding: var(--space-sm);
      margin-top: var(--space-sm);
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: var(--font-base);
      cursor: pointer;
      text-align: center;
      transition: border-color var(--transition);
      min-height: 44px;
    }
    .photo-upload-btn:active { border-color: var(--primary); }

    /* ========== 照片详情弹窗 ========== */
    .photo-detail-img {
      width: 100%;
      max-height: 50vh;
      border-radius: var(--radius);
      object-fit: contain;
      background: #000;
      margin-bottom: var(--space-md);
    }
    .status-toggle-row {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .status-toggle-btn {
      flex: 1;
      padding: 8px;
      border-radius: var(--radius);
      font-size: var(--font-sm);
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
    }
    .status-toggle-btn:active { transform: scale(0.95); }
    .status-toggle-btn.sel-raw {
      background: rgba(244,67,54,0.2);
      border-color: var(--danger);
      color: var(--danger);
    }
    .status-toggle-btn.sel-to_edit {
      background: rgba(255,152,0,0.2);
      border-color: var(--warning);
      color: var(--warning);
    }
    .status-toggle-btn.sel-edited {
      background: rgba(76,175,80,0.2);
      border-color: var(--success);
      color: var(--success);
    }

    /* ========== 素材类型切换 ========== */
    .media-type-tabs {
      display: flex;
      gap: 0;
      margin-bottom: var(--space-md);
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 3px;
    }
    .media-type-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: var(--radius);
      font-size: var(--font-sm);
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .media-type-tab.active {
      background: var(--gradient);
      color: #fff;
    }

    /* 视频导入区 */
    .video-import-area {
      width: 100%;
      height: 100px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color var(--transition);
      margin-top: var(--space-xs);
    }
    .video-import-area:active { border-color: var(--primary); }
    .video-import-area.has-video { border-style: solid; border-color: var(--success); }
    .video-import-area video {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; top:0; left:0; border-radius: var(--radius);
    }
    .video-import-area .video-placeholder {
      text-align: center; color: var(--text-muted);
    }
    .video-thumb-wrap {
      width: 100%; height: 100%;
      border-radius: var(--radius); overflow: hidden;
      position: relative; display: flex;
      align-items: center; justify-content: center;
      background: #000;
    }
    .video-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
    .video-thumb-wrap .play-icon {
      position: absolute; font-size: 32px; pointer-events: none;
    }
    /* 视频播放弹窗 */
    .video-player-modal {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; z-index: 400;
      align-items: center; justify-content: center;
    }
    .video-player-modal.show { display: flex; }
    .video-player-modal video {
      max-width: 100%; max-height: 80vh;
    }
    .video-player-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2); color: #fff;
      border: none; font-size: 20px; cursor: pointer; z-index: 401;
      display: flex; align-items: center; justify-content: center;
    }

    /* 视频/音乐列表卡片 */
    .media-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .media-card {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm);
      background: var(--card);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform var(--transition);
    }
    .media-card:active { transform: scale(0.98); }
    .media-card .media-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .media-card .media-body { flex: 1; min-width: 0; }
    .media-card .media-title {
      font-size: var(--font-base);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .media-card .media-sub {
      font-size: var(--font-sm);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .media-card .media-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    /* ========== 文案生成器 ========== */
    .copy-char-selector { margin-bottom: var(--space-md); }
    .copy-section {
      margin-bottom: var(--space-md);
    }
    .copy-section h3 {
      font-size: var(--font-base);
      font-weight: 600;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    /* 台词列表 */
    .line-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .line-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm);
      background: var(--card);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      border: 2px solid transparent;
    }
    .line-item:active { transform: scale(0.98); }
    .line-item.selected {
      border-color: var(--primary);
      background: rgba(155,89,182,0.12);
    }
    .line-item .line-text {
      flex: 1;
      font-size: var(--font-base);
      color: var(--text);
      min-width: 0;
    }
    .line-item .line-del {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      font-size: 12px;
      opacity: 0.4;
    }
    .line-item .line-del:active { opacity: 1; }
    .line-add-btn {
      display: block;
      width: 100%;
      padding: var(--space-sm);
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: var(--font-base);
      cursor: pointer;
      text-align: center;
    }
    .line-add-btn:active { border-color: var(--primary); }
    /* 标签区 */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-chip {
      padding: 4px 12px;
      border-radius: var(--radius-xl);
      font-size: var(--font-sm);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }
    .tag-chip:active { transform: scale(0.95); }
    .tag-chip.checked {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }
    .tag-platform-row {
      display: flex;
      gap: 6px;
      margin-bottom: var(--space-sm);
      flex-wrap: wrap;
    }
    .platform-chip {
      padding: 4px 12px;
      border-radius: var(--radius-xl);
      font-size: 11px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
    }
    .platform-chip.active {
      background: rgba(155,89,182,0.2);
      border-color: var(--primary);
      color: var(--primary);
    }
    /* 预览区 */
    .copy-preview {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      white-space: pre-wrap;
      font-size: var(--font-base);
      line-height: 1.8;
      min-height: 80px;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .copy-preview:empty::after {
      content: '请先选择台词或标签，再点击「生成文案」';
      color: var(--text-muted);
      font-size: var(--font-sm);
    }
    .copy-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
    }

    /* ========== 导出预览 ========== */
    .export-preview {
      background: var(--bg);
      border-radius: var(--radius);
      padding: var(--space-md);
      font-family: "PingFang SC", "Microsoft YaHei", monospace;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      max-height: 50vh;
      overflow-y: auto;
      color: var(--text);
    }

    /* ========== 设置/导出 ========== */
    .settings-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: 1px solid var(--border);
    }
    .settings-section h3 {
      font-size: var(--font-base);
      margin-bottom: var(--space-sm);
    }
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) 0;
    }

    /* 折叠面板内添加按钮 */
    .acc-add-btn {
      display: block;
      width: 100%;
      padding: var(--space-sm);
      margin-top: var(--space-xs);
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: var(--font-base);
      cursor: pointer;
      text-align: center;
      transition: border-color var(--transition);
    }
    .acc-add-btn:active { border-color: var(--primary); }

    /* ========== 二次确认弹窗 ========== */
    .confirm-content {
      text-align: center;
      padding: var(--space-lg) 0;
    }
    .confirm-content .confirm-emoji { font-size: 40px; margin-bottom: var(--space-sm); }
    .confirm-content .confirm-text { font-size: var(--font-base); color: var(--text-secondary); }
    .confirm-content .confirm-highlight {
      font-size: var(--font-lg);
      font-weight: 600;
      color: var(--text);
      margin-top: var(--space-xs);
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ====== 视图 1：首页仪表盘 ====== -->
  <main id="view-dashboard" class="view active">
    <div class="page-header">
      <h1>CosPlan ✨</h1>
    </div>
    <!-- 统计卡片（JS 动态渲染） -->
    <div class="stats-grid" id="dashboard-stats"></div>
    <!-- 快捷操作 -->
    <div class="quick-actions" id="dashboard-actions"></div>
    <!-- 项目列表 -->
    <div class="section-title">📁 我的角色项目 <span class="count" id="project-count"></span></div>
    <div id="project-list-container">
      <!-- JS 动态渲染：项目卡片 or 空状态 -->
    </div>
  </main>

  <!-- ====== 视图 2：角色管理 ====== -->
  <main id="view-characters" class="view">
    <!-- 角色列表 -->
    <div id="char-list-wrap">
      <div class="page-header">
        <h1>📁 角色管理</h1>
        <span style="color:var(--text-muted);font-size:var(--font-sm);" id="char-count-header"></span>
      </div>
      <div id="character-grid-container"></div>
      <button class="fab" id="fab-add-character" title="新建角色">+</button>
    </div>
    <!-- 角色详情子视图（默认隐藏，点击角色卡片后显示） -->
    <div class="detail-view" id="character-detail-view">
      <button class="detail-back" id="btn-detail-back">◀ 返回列表</button>
      <div id="detail-content"></div>
    </div>
  </main>

  <!-- ====== 视图 3：筹备清单 ====== -->
  <main id="view-prep" class="view">
    <div class="page-header">
      <h1>📋 拍摄筹备</h1>
      <button class="btn btn-secondary" id="btn-export-prep" style="flex:none;padding:6px 14px;font-size:var(--font-sm);min-height:auto;">📤 导出文档</button>
    </div>
    <!-- 角色选择器 -->
    <div class="prep-char-selector">
      <select class="form-select" id="prep-char-select">
        <option value="">-- 请先选择角色 --</option>
      </select>
    </div>
    <!-- 四栏手风琴清单 -->
    <div id="prep-accordions"></div>
  </main>

  <!-- ====== 视图 4：素材管理（照片+视频+音乐） ====== -->
  <main id="view-photos" class="view">
    <div class="page-header">
      <h1>🖼️ 素材管理</h1>
    </div>
    <!-- 素材类型切换 -->
    <div class="media-type-tabs" id="media-type-tabs">
      <button class="media-type-tab active" data-mtype="photo">📷 照片</button>
      <button class="media-type-tab" data-mtype="video">🎬 视频</button>
      <button class="media-type-tab" data-mtype="music">🎵 音乐</button>
    </div>
    <!-- 角色 Tab -->
    <div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;" id="photo-char-tabs"></div>
    <!-- 照片专用：状态筛选 -->
    <div class="photo-filter-bar" id="photo-filter-bar">
      <button class="filter-chip active" data-filter="all">全部</button>
      <button class="filter-chip" data-filter="raw">🔴 原片待选</button>
      <button class="filter-chip" data-filter="to_edit">🟡 待修图</button>
      <button class="filter-chip" data-filter="edited">🟢 已修完成</button>
    </div>
    <!-- 视频/音乐专用：状态筛选 -->
    <div class="photo-filter-bar" id="media-filter-bar" style="display:none;">
      <button class="filter-chip active" data-filter="all">全部</button>

<script>
/* =============================================================
   CosPlan - 核心 JavaScript
   架构：工具函数 → 数据层 → 视图切换 → 各视图渲染
   ============================================================= */

// ==================== 工具函数 ====================

/** 生成简易唯一 ID：时间戳(36进制) + 随机数(36进制) */
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
}

/** 从 localStorage 读取数据，返回数组（失败时返回空数组） */
function loadData(key) {
  try {
    return JSON.parse(localStorage.getItem(key) || '[]');
  } catch (e) {
    return [];
  }
}

/** 保存数据到 localStorage */
function saveData(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
  } catch (e) {
    showToast('存储空间不足，请清理旧数据');
  }
}

/** 底部 Toast 提示，2.5 秒后自动消失 */
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function () {
    el.classList.remove('show');
  }, 2500);
}

/** 图片压缩：File → Canvas 缩放 → Base64 DataURL */
function compressImage(file, maxWidth, quality) {
  maxWidth = maxWidth || 800;
  quality = quality || 0.6;
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        var w = img.width;
        var h = img.height;
        if (w > maxWidth) {
          h = Math.round(h * (maxWidth / w));
          w = maxWidth;
        }
        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = function () { reject(new Error('图片加载失败')); };
      img.src = e.target.result;
    };
    reader.onerror = function () { reject(new Error('文件读取失败')); };
    reader.readAsDataURL(file);
  });
}

// ==================== 数据层 ====================

const STORAGE_KEYS = {
  characters: 'cosplan_characters',
  prepItems:  'cosplan_prep_items',
  photos:     'cosplan_photos',
  videos:     'cosplan_videos',
  music:      'cosplan_music',
  copies:     'cosplan_copies'
};

/** 获取指定角色的筹备完成率 (0-100)，如果没有筹备项返回 0 */
function getCharacterProgress(charId) {
  var items = loadData(STORAGE_KEYS.prepItems).filter(function (item) {
    return item.characterId === charId;
  });
  if (items.length === 0) return 0;
  var done = items.filter(function (item) { return item.completed; }).length;
  return Math.round((done / items.length) * 100);
}

/** 获取指定角色各状态照片数量 */
function getPhotoStats(charId) {
  var photos = loadData(STORAGE_KEYS.photos).filter(function (p) {
    return p.characterId === charId;
  });
  return {
    raw:     photos.filter(function (p) { return p.status === 'raw'; }).length,
    toEdit:  photos.filter(function (p) { return p.status === 'to_edit'; }).length,
    edited:  photos.filter(function (p) { return p.status === 'edited'; }).length,
    total:   photos.length
  };
}

/** 获取全局统计 */
function getGlobalStats() {
  var characters = loadData(STORAGE_KEYS.characters);
  var prepItems  = loadData(STORAGE_KEYS.prepItems);
  var photos     = loadData(STORAGE_KEYS.photos);

  var inProgress = characters.filter(function (c) {
    return c.status !== 'done';
  }).length;

  var toEditCount = photos.filter(function (p) {
    return p.status === 'to_edit';
  }).length;

  var pendingPrep = prepItems.filter(function (item) {
    return !item.completed;
  }).length;

  var doneCount = characters.filter(function (c) {
    return c.status === 'done';
  }).length;

  return {
    inProgress: inProgress,
    toEdit: toEditCount,
    pendingPrep: pendingPrep,
    done: doneCount
  };
}

/** 项目状态 → 中文标签 + CSS类 */
var STATUS_MAP = {
  prep:      { label: '筹备中', css: 'status-prep' },
  shooting:  { label: '拍摄中', css: 'status-shooting' },
  selecting: { label: '选片中', css: 'status-selecting' },
  editing:   { label: '修图中', css: 'status-editing' },
  done:      { label: '已完成', css: 'status-done' }
};

// ==================== 视图切换 ====================

/** 当前显示的视图名称 */
var currentView = 'dashboard';

/** 切换到指定视图 */
function switchView(viewName) {
  // 更新所有视图的显示状态
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) {
    views[i].classList.remove('active');
  }
  var target = document.getElementById('view-' + viewName);
  if (target) target.classList.add('active');

  // 更新底部导航选中态
  var navItems = document.querySelectorAll('.nav-item');
  for (var j = 0; j < navItems.length; j++) {
    var btn = navItems[j];
    if (btn.getAttribute('data-view') === viewName) {
      btn.classList.add('selected');
    } else {
      btn.classList.remove('selected');
    }
  }

  currentView = viewName;

  // 切换视图时按需刷新
  if (viewName === 'dashboard') {
    renderDashboard();
    hideCharacterDetail();
  } else if (viewName === 'characters') {
    renderCharacterList();
  } else if (viewName === 'prep') {
    renderPrepList();
  } else if (viewName === 'photos') {
    renderPhotoPage();
  } else if (viewName === 'copy') {
    renderCopyPage();
  }
}

// ==================== 底部导航事件绑定 ====================

(function initNav() {
  var navItems = document.querySelectorAll('.nav-item');
  for (var i = 0; i < navItems.length; i++) {
    navItems[i].addEventListener('click', function () {
      var view = this.getAttribute('data-view');
      if (view) switchView(view);
    });
  }
})();

// ==================== 首页仪表盘渲染 ====================

/** 渲染首页全部内容 */
function renderDashboard() {
  var characters = loadData(STORAGE_KEYS.characters);
  var stats = getGlobalStats();

  renderStats(stats);
  renderQuickActions();
  renderProjectList(characters);
}

/** 渲染 4 格统计卡片 */
function renderStats(stats) {
  var container = document.getElementById('dashboard-stats');
  if (!container) return;

  var cards = [
    { emoji: '🎬', number: stats.inProgress, label: '进行中' },
    { emoji: '🖼️', number: stats.toEdit, label: '待修图' },
    { emoji: '📋', number: stats.pendingPrep, label: '待筹备' },
    { emoji: '✅', number: stats.done, label: '已完成' }
  ];

  var html = '';
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    html += '<div class="stat-card">' +
      '<div class="stat-emoji">' + c.emoji + '</div>' +
      '<div class="stat-number">' + c.number + '</div>' +
      '<div class="stat-label">' + c.label + '</div>' +
    '</div>';
  }
  container.innerHTML = html;

  // 点击统计卡片跳转
  var cardEls = container.querySelectorAll('.stat-card');
  cardEls[0] && cardEls[0].addEventListener('click', function () { switchView('characters'); });
  cardEls[1] && cardEls[1].addEventListener('click', function () { switchView('photos'); });
  cardEls[2] && cardEls[2].addEventListener('click', function () { switchView('prep'); });
  cardEls[3] && cardEls[3].addEventListener('click', function () { showToast('已完成 ' + stats.done + ' 个项目'); });
}

/** 渲染快捷操作按钮 */
function renderQuickActions() {
  var container = document.getElementById('dashboard-actions');
  if (!container) return;
  container.innerHTML =
    '<button class="quick-btn primary" id="btn-new-character">+ 新建角色</button>' +
    '<button class="quick-btn secondary" id="btn-go-photos">📷 查看待修图</button>';

  document.getElementById('btn-new-character').addEventListener('click', function () {
    openCharacterForm(null);
  });
  document.getElementById('btn-go-photos').addEventListener('click', function () {
    switchView('photos');
    photoFilter = 'to_edit';
    // 自动选第一个有照片的角色
    var chars = loadData(STORAGE_KEYS.characters);
    for (var ci = 0; ci < chars.length; ci++) {
      var ps = getPhotoStats(chars[ci].id);
      if (ps.toEdit > 0) { photoSelectedCharId = chars[ci].id; break; }
    }
    setTimeout(function () { renderPhotoPage(); }, 50);
  });
}

/** 渲染项目列表 */
function renderProjectList(characters) {
  var container = document.getElementById('project-list-container');
  var countEl   = document.getElementById('project-count');
  if (!container) return;

  // 更新计数
  if (countEl) {
    countEl.textContent = characters.length > 0 ? '(' + characters.length + ')' : '';
  }

  if (characters.length === 0) {
    // 空状态
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-emoji">📁</div>' +
        '<div class="empty-text">还没有角色项目</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">' +
          '点击下方「角色」Tab 创建你的第一个角色吧！</div>' +
      '</div>';
    return;
  }

  // 按创建时间倒序排列
  characters.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

  var html = '<div class="project-list">';
  for (var i = 0; i < characters.length; i++) {
    var ch = characters[i];
    var progress = getCharacterProgress(ch.id);
    var photoStats = getPhotoStats(ch.id);
    var statusInfo = STATUS_MAP[ch.status] || STATUS_MAP.prep;

    // 头像：有图片用 img，没有用默认 emoji
    var avatarHtml;
    if (ch.avatar) {
      avatarHtml = '<div class="project-avatar avatar-circle">' +
        '<img src="' + ch.avatar + '" alt="' + ch.name + '"></div>';
    } else {
      avatarHtml = '<div class="project-avatar avatar-circle">🎭</div>';
    }

    // 副标题显示（来源 + 照片统计简况）
    var subtitle = ch.source || '';
    if (photoStats.total > 0) {
      subtitle += (subtitle ? ' · ' : '') + '照片 ' + photoStats.total + ' 张';
    }

    // 状态简要描述
    var statusDesc = '';
    if (ch.status === 'editing' && photoStats.toEdit > 0) {
      statusDesc = '还剩 ' + photoStats.toEdit + ' 张待修';
    } else if (ch.status === 'prep' && getPendingPrepCount(ch.id) > 0) {
      statusDesc = '筹备还差 ' + getPendingPrepCount(ch.id) + ' 项';
    } else if (ch.status === 'done') {
      statusDesc = '全部完成';
    } else {
      statusDesc = statusInfo.label;
    }

    html += '<div class="project-card" data-char-id="' + ch.id + '">' +
      '<span class="project-status-tag ' + statusInfo.css + '">' + statusInfo.label + '</span>' +
      avatarHtml +
      '<div class="project-info">' +
        '<div class="project-name">' + escapeHtml(ch.name) + '</div>' +
        (subtitle ? '<div class="project-source">' + escapeHtml(subtitle) + '</div>' : '') +
        '<div class="project-progress-wrap">' +
          '<div class="project-progress-bar">' +
            '<div class="project-progress-fill" style="width:' + progress + '%"></div>' +
          '</div>' +
          '<span class="project-progress-text">' + progress + '%</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:1px;">' + statusDesc + '</div>' +
      '</div>' +
    '</div>';
  }
  html += '</div>';
  container.innerHTML = html;

  // 点击项目卡片 → 跳转到角色管理页
  var cards = container.querySelectorAll('.project-card');
  for (var j = 0; j < cards.length; j++) {
    cards[j].addEventListener('click', function () {
      var charId = this.getAttribute('data-char-id');
      switchView('characters');
      // Phase 3 会改为跳转角色详情
    });
  }
}

/** 获取某角色未完成筹备项数量 */
function getPendingPrepCount(charId) {
  var items = loadData(STORAGE_KEYS.prepItems).filter(function (item) {
    return item.characterId === charId && !item.completed;
  });
  return items.length;
}

/** 简单 HTML 转义，防 XSS */
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ==================== 角色管理 ====================

/** 角色表单状态：null=新建，string=编辑中的角色ID */
var editingCharId = null;
/** 表单中临时存储的头像 Base64 */
var tempAvatar = '';
/** 表单中临时存储的参考图数组 [{data, id}] */
var tempRefImages = [];

/** 打开角色表单弹窗。charId=null 为新建，否则为编辑 */
function openCharacterForm(charId) {
  var modal = document.getElementById('modal-character-form');
  var title = document.getElementById('modal-char-title');
  var idField = document.getElementById('char-form-id');
  var delGroup = document.getElementById('btn-group-delete');

  editingCharId = charId;
  tempRefImages = [];

  if (charId) {
    // 编辑模式：加载已有数据
    var characters = loadData(STORAGE_KEYS.characters);
    var ch = null;
    for (var i = 0; i < characters.length; i++) {
      if (characters[i].id === charId) { ch = characters[i]; break; }
    }
    if (!ch) { showToast('角色不存在'); return; }

    title.textContent = '编辑角色';
    idField.value = ch.id;
    document.getElementById('char-name').value = ch.name || '';
    document.getElementById('char-source').value = ch.source || '';
    document.getElementById('char-bio').value = ch.bio || '';
    document.getElementById('char-status').value = ch.status || 'prep';
    tempAvatar = ch.avatar || '';
    tempRefImages = (ch.refImages || []).slice();
    delGroup.style.display = 'flex';
  } else {
    // 新建模式
    title.textContent = '新建角色';
    idField.value = '';
    document.getElementById('char-name').value = '';
    document.getElementById('char-source').value = '';
    document.getElementById('char-bio').value = '';
    document.getElementById('char-status').value = 'prep';
    tempAvatar = '';
    tempRefImages = [];
    delGroup.style.display = 'none';
  }

  renderAvatarPreview();
  renderRefImagesPreview();
  modal.classList.add('show');
}

/** 关闭角色表单弹窗 */
function closeCharacterForm() {
  document.getElementById('modal-character-form').classList.remove('show');
  editingCharId = null;
  tempAvatar = '';
  tempRefImages = [];
}

/** 渲染头像预览区 */
function renderAvatarPreview() {
  var area = document.getElementById('avatar-upload-area');
  if (tempAvatar) {
    area.innerHTML = '<img src="' + tempAvatar + '" alt="头像">';
    area.classList.add('has-image');
  } else {
    area.innerHTML =
      '<div class="upload-placeholder">' +
        '<div class="upload-emoji">🎭</div>' +
        '<div class="upload-text">点击上传头像</div>' +
      '</div>';
    area.classList.remove('has-image');
  }
}

/** 渲染参考图缩略图列表 */
function renderRefImagesPreview() {
  var container = document.getElementById('ref-images-container');
  if (!container) return;
  var html = '';
  for (var i = 0; i < tempRefImages.length; i++) {
    var ref = tempRefImages[i];
    html += '<div class="ref-thumb">' +
      '<img src="' + ref.data + '" alt="参考图">' +
      '<button class="ref-remove" data-ref-index="' + i + '" title="删除参考图">✕</button>' +
    '</div>';
  }
  container.innerHTML = html;

  // 绑定删除按钮
  var removes = container.querySelectorAll('.ref-remove');
  for (var r = 0; r < removes.length; r++) {
    removes[r].addEventListener('click', function (e) {
      e.stopPropagation();
      var idx = parseInt(this.getAttribute('data-ref-index'));
      tempRefImages.splice(idx, 1);
      renderRefImagesPreview();
    });
  }
}

/** 保存角色（新建或编辑） */
function saveCharacter() {
  var name = document.getElementById('char-name').value.trim();
  if (!name) {
    showToast('请输入角色名');
    return;
  }
  var character = {
    id: editingCharId || genId(),
    name: name,
    source: document.getElementById('char-source').value.trim(),
    bio: document.getElementById('char-bio').value.trim(),
    avatar: tempAvatar,
    refImages: tempRefImages,
    status: document.getElementById('char-status').value,
    createdAt: editingCharId ? undefined : Date.now()
  };

  var characters = loadData(STORAGE_KEYS.characters);

  if (editingCharId) {
    // 编辑：覆盖原有数据，保留 createdAt
    for (var i = 0; i < characters.length; i++) {
      if (characters[i].id === editingCharId) {
        character.createdAt = characters[i].createdAt;
        characters[i] = character;
        break;
      }
    }
    showToast('角色已更新');
  } else {
    // 新建
    characters.push(character);
    showToast('角色创建成功');
  }

  saveData(STORAGE_KEYS.characters, characters);
  closeCharacterForm();
  renderCharacterList();
  renderDashboard();
}

/** 删除角色（二次确认后执行） */
function deleteCharacter(charId) {
  var characters = loadData(STORAGE_KEYS.characters);
  var ch = null;
  for (var i = 0; i < characters.length; i++) {
    if (characters[i].id === charId) { ch = characters[i]; break; }
  }
  if (!ch) return;

  // 级联删除关联数据
  var prepItems = loadData(STORAGE_KEYS.prepItems).filter(function (item) {
    return item.characterId !== charId;
  });
  var photos = loadData(STORAGE_KEYS.photos).filter(function (p) {
    return p.characterId !== charId;
  });
  var copies = loadData(STORAGE_KEYS.copies).filter(function (c) {
    return c.characterId !== charId;
  });

  characters = characters.filter(function (c) { return c.id !== charId; });

  saveData(STORAGE_KEYS.characters, characters);
  saveData(STORAGE_KEYS.prepItems, prepItems);
  saveData(STORAGE_KEYS.photos, photos);
  saveData(STORAGE_KEYS.copies, copies);

  showToast('已删除角色：' + ch.name);
  closeCharacterForm();
  renderCharacterList();
  renderDashboard();
}

/** 渲染角色管理页 */
function renderCharacterList() {
  var container = document.getElementById('character-grid-container');
  var countEl = document.getElementById('char-count-header');
  if (!container) return;

  var characters = loadData(STORAGE_KEYS.characters);
  if (countEl) {
    countEl.textContent = characters.length > 0 ? characters.length + ' 个角色' : '';
  }

  // 空状态
  if (characters.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-emoji">🎭</div>' +
        '<div class="empty-text">还没有角色</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">点击右下角 + 按钮创建第一个角色</div>' +
      '</div>';
    return;
  }

  // 按时间倒序
  characters.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

  var html = '<div class="character-grid">';
  for (var i = 0; i < characters.length; i++) {
    var ch = characters[i];
    var refCount = (ch.refImages || []).length;

    // 卡片图片区
    var imgContent;
    if (ch.avatar) {
      imgContent = '<img src="' + ch.avatar + '" alt="' + escapeHtml(ch.name) + '">';
    } else {
      imgContent = '<span style="font-size:56px;">🎭</span>';
    }

    html += '<div class="character-card" data-char-id="' + ch.id + '">' +
      '<div class="delete-hint">🗑️</div>' +
      '<div class="card-img-wrap">' + imgContent + '</div>' +
      '<div class="card-body">' +
        '<div class="card-name">' + escapeHtml(ch.name) + '</div>' +
        (ch.source ? '<div class="card-source">' + escapeHtml(ch.source) + '</div>' : '') +
        '<div class="card-meta">' +
          (refCount > 0 ? '<span>📷' + refCount + '</span>' : '') +
          '<span>' + ((STATUS_MAP[ch.status] && STATUS_MAP[ch.status].label) || '筹备中') + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  html += '</div>';
  container.innerHTML = html;

  // 绑定卡片点击事件
  var cards = container.querySelectorAll('.character-card');
  var longPressTimer = null;

  for (var j = 0; j < cards.length; j++) {
    (function (card) {
      // 单击 → 查看详情
      card.addEventListener('click', function (e) {
        if (card.classList.contains('long-press-mode')) {
          card.classList.remove('long-press-mode');
          return;
        }
        var id = card.getAttribute('data-char-id');
        showCharacterDetail(id);
      });

      // 长按 → 删除
      card.addEventListener('touchstart', function () {
        longPressTimer = setTimeout(function () {
          card.classList.add('long-press-mode');
          // 震动反馈
          if (navigator.vibrate) navigator.vibrate(15);
        }, 600);
      });
      card.addEventListener('touchend', function () { clearTimeout(longPressTimer); });
      card.addEventListener('touchmove', function () { clearTimeout(longPressTimer); });

      // PC 右键 → 删除模式
      card.addEventListener('contextmenu', function (e) {
        e.preventDefault();
        card.classList.toggle('long-press-mode');
      });
    })(cards[j]);
  }
}

// ==================== 角色详情页 ====================

/** 当前正在查看详情的角色 ID */
var detailCharId = null;

/** 显示角色详情 */
function showCharacterDetail(charId) {
  var characters = loadData(STORAGE_KEYS.characters);
  var ch = null;
  for (var i = 0; i < characters.length; i++) {
    if (characters[i].id === charId) { ch = characters[i]; break; }
  }
  if (!ch) { showToast('角色不存在'); return; }

  detailCharId = charId;
  var listWrap = document.getElementById('char-list-wrap');
  var detailView = document.getElementById('character-detail-view');
  var detailContent = document.getElementById('detail-content');

  if (!listWrap || !detailView || !detailContent) return;

  // 统计
  var prepItems = loadData(STORAGE_KEYS.prepItems).filter(function (item) { return item.characterId === charId; });
  var prepDone = prepItems.filter(function (item) { return item.completed; }).length;
  var photoStats = getPhotoStats(charId);
  var copies = loadData(STORAGE_KEYS.copies).filter(function (c) { return c.characterId === charId; });

  // 头像区
  var avatarHtml;
  if (ch.avatar) {
    avatarHtml = '<img src="' + ch.avatar + '" alt="' + escapeHtml(ch.name) + '">';
  } else {
    avatarHtml = '<span style="font-size:80px;">🎭</span>';
  }

  // 参考图横滚
  var refHtml = '';
  var refImages = ch.refImages || [];
  if (refImages.length > 0) {
    refHtml = '<div class="detail-section"><h3>🖼️ 参考图集 (' + refImages.length + '张)</h3><div class="ref-scroll">';
    for (var r = 0; r < refImages.length; r++) {
      refHtml += '<div class="ref-scroll-item"><img src="' + refImages[r].data + '" alt="参考图"></div>';
    }
    refHtml += '</div></div>';
  }

  // 状态标签
  var statusLabel = (STATUS_MAP[ch.status] && STATUS_MAP[ch.status].label) || '筹备中';

  // 构建详情 HTML
  var html =
    '<div class="detail-avatar-lg">' + avatarHtml + '</div>' +
    '<div class="detail-name">' + escapeHtml(ch.name) + '</div>' +
    (ch.source ? '<div class="detail-source">' + escapeHtml(ch.source) + '</div>' : '') +
    '<div style="margin-bottom:12px;"><span style="font-size:12px;color:var(--text-muted);">状态：</span>' +
      '<span style="font-size:12px;color:var(--primary);">' + statusLabel + '</span></div>' +
    (ch.bio ? '<div class="detail-bio">' + escapeHtml(ch.bio) + '</div>' : '') +
    refHtml +
    '<div class="detail-section"><h3>📊 关联数据</h3>' +
      '<div class="detail-stats-row">' +
        '<div class="detail-stat" id="detail-go-prep">' +
          '<div class="ds-num">' + prepDone + '/' + prepItems.length + '</div>' +
          '<div class="ds-label">📋 筹备清单</div>' +
        '</div>' +
        '<div class="detail-stat" id="detail-go-photos">' +
          '<div class="ds-num">' + photoStats.total + '</div>' +
          '<div class="ds-label">🖼️ 照片素材</div>' +
        '</div>' +
        '<div class="detail-stat" id="detail-go-copy">' +
          '<div class="ds-num">' + copies.length + '</div>' +
          '<div class="ds-label">✍️ 文案模板</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="btn-group">' +
      '<button class="btn btn-primary" id="detail-btn-edit">✏️ 编辑角色</button>' +
      '<button class="btn btn-secondary" id="detail-btn-switch-status">🔄 切换状态</button>' +
    '</div>';

  detailContent.innerHTML = html;

  // 切换到详情视图
  listWrap.style.display = 'none';
  detailView.classList.add('active');

  // 绑定按钮事件
  document.getElementById('detail-btn-edit').addEventListener('click', function () {
    openCharacterForm(charId);
  });
  document.getElementById('detail-btn-switch-status').addEventListener('click', function () {
    cycleCharacterStatus(charId);
    showCharacterDetail(charId); // 刷新详情
    renderCharacterList();
    renderDashboard();
  });
  document.getElementById('detail-go-prep').addEventListener('click', function () {
    switchView('prep');
    // 自动选中当前角色
    setTimeout(function () {
      var sel = document.getElementById('prep-char-select');
      if (sel) { sel.value = charId; renderPrepList(); }
    }, 100);
  });
  document.getElementById('detail-go-photos').addEventListener('click', function () {
    switchView('photos');
    photoSelectedCharId = detailCharId;
    photoFilter = 'all';
    setTimeout(function () { renderPhotoPage(); }, 50);
  });
  document.getElementById('detail-go-copy').addEventListener('click', function () {
    switchView('copy');
    copySelectedCharId = detailCharId;
    selectedLineId = '';
    selectedTagIds = [];
    setTimeout(function () { renderCopyPage(); }, 50);
  });
}

/** 关闭角色详情，返回列表 */
function hideCharacterDetail() {
  var listWrap = document.getElementById('char-list-wrap');
  var detailView = document.getElementById('character-detail-view');
  if (listWrap) listWrap.style.display = '';
  if (detailView) detailView.classList.remove('active');
  detailCharId = null;
}

/** 切换角色状态到下一步 */
function cycleCharacterStatus(charId) {
  var order = ['prep', 'shooting', 'selecting', 'editing', 'done'];
  var characters = loadData(STORAGE_KEYS.characters);
  var newStatus = '';
  for (var i = 0; i < characters.length; i++) {
    if (characters[i].id === charId) {
      var curIdx = order.indexOf(characters[i].status);
      if (curIdx < 0) curIdx = 0;
      var nextIdx = (curIdx + 1) % order.length;
      characters[i].status = order[nextIdx];
      newStatus = characters[i].status;
      break;
    }
  }
  saveData(STORAGE_KEYS.characters, characters);
  var label = (STATUS_MAP[newStatus] || STATUS_MAP.prep).label;
  showToast('状态已切换：' + label);
}

/** 四分类配置 */
var PREP_CATEGORIES = [
  { key: 'costume',    emoji: '👗', label: '服装' },
  { key: 'prop',       emoji: '🔧', label: '道具' },
  { key: 'location',   emoji: '📍', label: '场地' },
  { key: 'storyboard', emoji: '🎬', label: '分镜' }
];

/** 当前筹备页选中的角色 ID */
var prepSelectedCharId = '';

/** 渲染筹备清单页 */
function renderPrepList() {
  var charSelect = document.getElementById('prep-char-select');
  var accordionsWrap = document.getElementById('prep-accordions');
  if (!charSelect || !accordionsWrap) return;

  // 更新角色选择器
  var characters = loadData(STORAGE_KEYS.characters);
  var opts = '<option value="">-- 请选择角色 --</option>';
  for (var i = 0; i < characters.length; i++) {
    var sel = (characters[i].id === prepSelectedCharId) ? ' selected' : '';
    opts += '<option value="' + characters[i].id + '"' + sel + '>' +
      escapeHtml(characters[i].name) + '</option>';
  }
  charSelect.innerHTML = opts;

  if (!prepSelectedCharId) {
    accordionsWrap.innerHTML =
      '<div class="empty-state"><div class="empty-emoji">📋</div>' +
      '<div class="empty-text">请先选择一个角色</div></div>';
    return;
  }

  // 获取该角色的筹备项
  var allItems = loadData(STORAGE_KEYS.prepItems).filter(function (item) {
    return item.characterId === prepSelectedCharId;
  });

  // 按分类构建手风琴
  var html = '';
  for (var c = 0; c < PREP_CATEGORIES.length; c++) {
    var cat = PREP_CATEGORIES[c];
    var catItems = allItems.filter(function (item) { return item.category === cat.key; });
    var doneCount = catItems.filter(function (item) { return item.completed; }).length;
    var totalCount = catItems.length;

    html += '<div class="accordion' + (c === 0 ? ' open' : '') + '" data-category="' + cat.key + '">' +
      '<div class="accordion-header">' +
        '<span><span class="acc-title">' + cat.emoji + ' ' + cat.label +
          '</span> <span class="acc-count">' + doneCount + '/' + totalCount + '</span></span>' +
        '<span class="acc-arrow">▼</span>' +
      '</div>' +
      '<div class="accordion-body">';

    if (catItems.length > 0) {
      for (var p = 0; p < catItems.length; p++) {
        var item = catItems[p];
        html += '<div class="prep-item" data-prep-id="' + item.id + '">' +
          '<div class="prep-checkbox' + (item.completed ? ' checked' : '') + '">✓</div>' +
          '<div class="prep-item-body">' +
            '<div class="prep-item-title' + (item.completed ? ' done' : '') + '">' + escapeHtml(item.title) + '</div>' +
            (item.note ? '<div class="prep-item-note">' + escapeHtml(item.note) + '</div>' : '') +
            (item.link ? '<a class="prep-item-link" href="' + item.link + '" target="_blank" onclick="event.stopPropagation();">🔗 链接</a>' : '') +
            (item.image ? '<div class="prep-item-thumb"><img src="' + item.image + '" alt="参考图"></div>' : '') +
          '</div>' +
          '<button class="prep-item-delete" title="删除">✕</button>' +
        '</div>';
      }
    } else {
      html += '<div style="color:var(--text-muted);font-size:var(--font-sm);padding:var(--space-sm) 0;text-align:center;">暂无' + cat.label + '项</div>';
    }

    html += '<button class="acc-add-btn" data-category="' + cat.key + '">+ 添加' + cat.label + '</button>' +
      '</div></div>';
  }

  accordionsWrap.innerHTML = html;

  // 绑定手风琴折叠
  var headers = accordionsWrap.querySelectorAll('.accordion-header');
  for (var h = 0; h < headers.length; h++) {
    headers[h].addEventListener('click', function () {
      var acc = this.parentElement;
      acc.classList.toggle('open');
    });
  }

  // 绑定完成勾选
  var checkboxes = accordionsWrap.querySelectorAll('.prep-checkbox');
  for (var cb = 0; cb < checkboxes.length; cb++) {
    checkboxes[cb].addEventListener('click', function (e) {
      e.stopPropagation();
      var prepItem = this.parentElement;
      var prepId = prepItem.getAttribute('data-prep-id');
      togglePrepComplete(prepId);
    });
  }

  // 绑定整行点击也可切换
  var prepItems = accordionsWrap.querySelectorAll('.prep-item-body');
  for (var pi = 0; pi < prepItems.length; pi++) {
    prepItems[pi].addEventListener('click', function () {
      var prepId = this.parentElement.getAttribute('data-prep-id');
      openPrepForm(prepSelectedCharId, prepId);
    });
  }

  // 绑定删除按钮
  var delBtns = accordionsWrap.querySelectorAll('.prep-item-delete');
  for (var d = 0; d < delBtns.length; d++) {
    delBtns[d].addEventListener('click', function (e) {
      e.stopPropagation();
      var prepId = this.parentElement.getAttribute('data-prep-id');
      deletePrepItem(prepId);
    });
  }

  // 绑定添加按钮
  var addBtns = accordionsWrap.querySelectorAll('.acc-add-btn');
  for (var a = 0; a < addBtns.length; a++) {
    addBtns[a].addEventListener('click', function () {
      var cat = this.getAttribute('data-category');
      openPrepForm(prepSelectedCharId, null, cat);
    });
  }
}

/** 切换筹备项完成状态 */
function togglePrepComplete(prepId) {
  var items = loadData(STORAGE_KEYS.prepItems);
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === prepId) {
      items[i].completed = !items[i].completed;
      break;
    }
  }
  saveData(STORAGE_KEYS.prepItems, items);
  renderPrepList();
  renderDashboard();
}

/** 筹备表单中临时预览图 */
var tempPrepImage = '';

/** 打开筹备项表单弹窗（新增/编辑） */
function openPrepForm(charId, prepId, category) {
  var modal = document.getElementById('modal-prep-form');
  var title = document.getElementById('modal-prep-title');
  var idField = document.getElementById('prep-form-id');

    for (var i = 0; i < items.length; i++) {
      if (items[i].id === prepId) { item = items[i]; break; }

    title.textContent = '添加筹备项';
    idField.value = '';
    catField.value = category || 'costume';
    catGroup.style.display = 'block';
    document.getElementById('prep-category').value = category || 'costume';
    document.getElementById('prep-title').value = '';
    document.getElementById('prep-link').value = '';
    document.getElementById('prep-note').value = '';

/** 渲染筹备项参考图预览 */
function renderPrepImagePreview() {
  var area = document.getElementById('prep-img-upload-area');
  if (!area) return;
  if (tempPrepImage) {
    area.innerHTML = '<img src="' + tempPrepImage + '" alt="参考图">';
